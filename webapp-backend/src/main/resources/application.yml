server:
  port: 8080

spring:
  application:
    name: gah-facilities-web-backend
  datasource:
    url: ${GAH_DB_URL:jdbc:h2:mem:gah_facilities;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE}
    username: ${GAH_DB_USER:sa}
    password: ${GAH_DB_PASSWORD:}
    driver-class-name: ${GAH_DB_DRIVER:org.h2.Driver}
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
  flyway:
    enabled: ${GAH_FLYWAY_ENABLED:false}
    locations: classpath:db/migration
  h2:
    console:
      enabled: true

security:
  jwt:
    secret: ${GAH_JWT_SECRET:change-this-in-production-32-bytes-minimum}
  cors:
    allowed-origin-patterns: ${GAH_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*,http://192.168.*:*,http://10.*:*,http://172.16.*:*}

logging:
  level:
    root: INFO
    com.gah.facilities: INFO
